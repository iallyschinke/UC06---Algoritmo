<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- Permite que a página se adapte a celulares -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Criação de Chinchilas</title>

    <!-- Conecta o CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container">
      <h1>🐭 Criação de Chinchilas</h1>

      <p>Informe a quantidade inicial de chinchilas e o período de criação.</p>

      <form id="formChinchilas">
        <label for="quantidadeInicial">
          Quantidade inicial de chinchilas:
        </label>

        <input
          type="number"
          id="quantidadeInicial"
          min="2"
          placeholder="Exemplo: 2"
          required
        />

        <label for="anos"> Quantidade de anos: </label>

        <input
          type="number"
          id="anos"
          min="1"
          placeholder="Exemplo: 4"
          required
        />

        <button type="submit">Calcular criação</button>
      </form>

      <!-- Área em que o JavaScript exibirá o resultado -->
      <div id="resultado" aria-live="polite"></div>
    </main>

    <!-- Conecta o JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
