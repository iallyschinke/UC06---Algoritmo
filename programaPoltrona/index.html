<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Reserva de Poltronas</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container">
      <section class="card">
        <header class="cabecalho">
          <div class="icone">🎭</div>

          <p class="subtitulo">Show musical</p>

          <h1>Reserva de Poltronas</h1>

          <p class="descricao">
            Escolha uma poltrona disponível, confirme a reserva ou restaure toda
            a sessão.
          </p>
        </header>

        <section class="painel-controle">
          <div class="campo">
            <label for="inPoltrona">Número da poltrona</label>

            <input
              type="number"
              id="inPoltrona"
              min="1"
              max="240"
              placeholder="Ex.: 35"
              autocomplete="off"
              autofocus
            />
          </div>

          <div class="botoes">
            <button type="button" id="btReservar" class="btn-reservar">
              Reservar
            </button>

            <button type="button" id="btConfirmar" class="btn-confirmar">
              Confirmar reservas
            </button>

            <button type="button" id="btLimpar" class="btn-limpar">
              Limpar seleção
            </button>

            <button type="button" id="btRestaurar" class="btn-restaurar">
              Restaurar toda sessão
            </button>
          </div>
        </section>

        <p id="mensagem" class="mensagem"></p>

        <section class="informacoes">
          <div class="legenda">
            <div class="legenda-item">
              <span class="amostra disponivel"></span>
              Disponível
            </div>

            <div class="legenda-item">
              <span class="amostra reservada"></span>
              Selecionada
            </div>

            <div class="legenda-item">
              <span class="amostra ocupada"></span>
              Ocupada
            </div>
          </div>

          <div class="resumo">
            <span>
              Selecionadas:
              <strong id="totalReservadas">0</strong>
            </span>

            <span>
              Ocupadas:
              <strong id="totalOcupadas">0</strong>
            </span>

            <span>
              Disponíveis:
              <strong id="totalDisponiveis">240</strong>
            </span>
          </div>
        </section>

        <section class="teatro">
          <div class="palco">
            <span>Palco</span>
          </div>

          <div class="luz-palco"></div>

          <div id="mapaPoltronas" class="mapa-poltronas"></div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
