<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Contador de Visitas</title>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <div class="icone">👋</div>

        <p class="subtitulo">Contador de Visitas</p>

        <h1 id="mensagemVisita">Verificando suas visitas...</h1>

        <div class="contador">
          <span>Número de visitas</span>
          <strong id="numeroVisitas">0</strong>
        </div>

        <p class="informacao">
          O número de visitas dica salvo neste navegador.
        </p>

        <button type="button" id="btnReiniciar">Reiniciar Contador</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
