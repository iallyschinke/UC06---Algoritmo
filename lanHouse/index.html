<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício Lan House</title>
  </head>
  <body>
    <h1>Lan House de Aeroporto</h1>
    <p>
      Valor por 15 minutos
      <input
        type="number"
        id="inPreco"
        min="0"
        step="0.1"
        placeholder="Ex: 2,00"
      />
    </p>

    <p>
      Tempo de uso Total:
      <input type="number" id="inTempo" min="1" step="1" placeholder="Ex: 40" />
    </p>

    <p>
      <input type="button" value="Calcular Valor" id="btCalcular" />
    </p>

    <h2 id="outResposta"></h2>

    <script src="./lanHouse.js"></script>
  </body>
</html>
