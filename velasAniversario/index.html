<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Velas de Aniversário</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container">
      <section class="card">
        <header class="cabecalho">
          <div class="icone">🎂</div>

          <p class="subtitulo">Programa Velas de Aniversário</p>

          <h1>Qual é a sua idade?</h1>

          <p class="descricao">
            Digite uma idade entre 1 e 120 anos para visualizar as velas
            correspondentes.
          </p>
        </header>

        <form id="formIdade">
          <div class="campo">
            <label for="idade">Idade</label>

            <input
              type="number"
              id="idade"
              min="1"
              max="120"
              placeholder="Ex.: 25"
              autocomplete="off"
            />
          </div>

          <button type="submit" class="btn-mostrar">Mostrar velas</button>

          <button type="button" id="btnLimpar" class="btn-limpar">
            Limpar
          </button>
        </form>

        <p id="mensagemErro" class="mensagem-erro"></p>

        <section id="resultado" class="resultado oculto">
          <p class="texto-resultado">Sua idade é:</p>

          <div id="velas" class="velas"></div>

          <strong id="idadeResultado" class="idade-resultado"></strong>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
